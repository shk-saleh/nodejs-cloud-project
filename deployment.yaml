apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app

    spec:
      containers:
      - name: node-app
        image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/node-cloud-app:latest

        ports:
        - containerPort: 3000